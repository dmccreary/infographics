# Dan's Microsite Standards from here down

theme:
  name: material
  logo: img/logo.png
  favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    # this adds the prev and next icons in the footer
    - navigation.footer
    - content.action.edit

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

# these are mostly image prompts and some README files that we don't want to include in the generated site
exclude_docs: |
  sims/animal-cell/image-prompt.md
  sims/biogeochemical-cycles/image-prompt.md
  sims/brewing-beer/five-steps-in-brewing-image-prompts.md
  sims/comparative-anatomy/image-prompt.md
  sims/prokaryote-eukaryote-comparison/image-prompt.md
  sims/shared-libs/README.md
  sims/shared-libs/plan.md
  sims/template/index.md
  sims/template/README.md


plugins:
  - search
  - social
  - social_override
markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
extra_css:
   - css/extra.css
   - css/mascot.css
extra_javascript:
   - js/extra.js
