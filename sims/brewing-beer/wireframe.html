<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brewing Beer Process Explorer Wireframe</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 20px; background: #f5f7fb; color: #1d1d1d; }
    svg text { font-size: 13px; }
    .label { font-weight: bold; }
  </style>
</head>
<body>
  <h1>Brewing Beer Process Explorer Wireframe (Responsive width x 640px height)</h1>
  <svg width="900" height="700" viewBox="0 0 900 700">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#444"/>
      </marker>
    </defs>

    <!-- Drawing deck -->
    <rect x="20" y="20" width="860" height="480" fill="aliceblue" stroke="silver" stroke-width="2"/>
    <text x="30" y="38" class="label">Drawing Area</text>
    <line x1="40" y1="60" x2="840" y2="60" stroke="#444" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
    <text x="360" y="55">Responsive width span</text>

    <!-- Title -->
    <rect x="60" y="70" width="780" height="60" fill="#e7f4ff" stroke="#7fa5cc"/>
    <text x="450" y="105" text-anchor="middle" class="label">Title + Subtitle centered</text>

    <!-- Fermentation tank strip -->
    <rect x="60" y="140" width="780" height="50" fill="#fff0dd" stroke="#c28f4a"/>
    <text x="70" y="170">Strip: Fermentation Tank Status (sealed vs blow-off) + CO2 indicator</text>

    <!-- Instruction chip -->
    <rect x="60" y="198" width="780" height="34" fill="#fdf8d8" stroke="#c6aa4f"/>
    <text x="70" y="220">Instruction sentence (e.g., “Click play and follow the bubbles.”)</text>

    <!-- Flow container -->
    <rect x="50" y="240" width="800" height="210" fill="#dcedff" stroke="#73a6d1"/>
    <text x="60" y="258" class="label">Stage flow + CO2 counter area (paired with image overlays)</text>

    <!-- Stage cards -->
    <rect x="70" y="260" width="150" height="42" fill="#fffef1" stroke="#c27f55"/>
    <text x="80" y="285">Glucose/wort stage</text>
    <rect x="240" y="260" width="150" height="42" fill="#fff4e2" stroke="#c27f55"/>
    <text x="250" y="285">Glycolysis (2 ATP + 2 NADH)</text>
    <rect x="410" y="260" width="150" height="42" fill="#ffe6ce" stroke="#c27f55"/>
    <text x="420" y="285">Pyruvate stage</text>
    <rect x="580" y="260" width="150" height="42" fill="#ffd9c0" stroke="#c27f55"/>
    <text x="590" y="285">Acetaldehyde + CO2</text>
    <rect x="750" y="260" width="80" height="42" fill="#ffcdb0" stroke="#c27f55"/>
    <text x="760" y="285">Ethanol</text>

    <line x1="140" y1="310" x2="780" y2="310" stroke="#5a5a5a" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
    <text x="340" y="305">Arrow showing electron transfer direction</text>

    <!-- NADH arc + CO2 counter -->
    <rect x="90" y="330" width="320" height="38" fill="#fdf0ff" stroke="#b868cb"/>
    <text x="100" y="352">NADH -> NAD+ curved arrow annotation</text>
    <rect x="430" y="330" width="200" height="38" fill="#fff1de" stroke="#c27f55"/>
    <text x="440" y="352">CO2 bubble counter + icon row</text>

    <!-- Waste/ATP badges -->
    <rect x="70" y="380" width="320" height="34" fill="#ffeecf" stroke="#d58f2a"/>
    <text x="80" y="402">Waste badge: Ethanol + CO2 explanation</text>
    <rect x="410" y="380" width="320" height="34" fill="#fff7e0" stroke="#d58f2a"/>
    <text x="420" y="402">ATP badge: Net 2 ATP reminder</text>

    <!-- Organism chips -->
    <rect x="50" y="420" width="800" height="50" fill="#eefdf2" stroke="#66ad7f"/>
    <text x="60" y="450">Yeast strain chips (ale, lager, spontaneous) with fun facts</text>

    <!-- Step narration -->
    <rect x="50" y="475" width="800" height="60" fill="#fff3d8" stroke="#d29a3d"/>
    <text x="60" y="505" class="label">Step narration (5 steps) + progress bar + status text</text>

    <!-- Control deck -->
    <rect x="20" y="520" width="860" height="160" fill="white" stroke="silver" stroke-width="2"/>
    <text x="30" y="540" class="label">Control Area (responsive)</text>
    <line x1="40" y1="565" x2="840" y2="565" stroke="#444" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
    <text x="330" y="560">Controls stretch with width</text>

    <!-- Controls row 1 -->
    <rect x="50" y="575" width="200" height="40" fill="#ffdfe1" stroke="#c16f78"/>
    <text x="60" y="600">Start/Pause Simulation</text>
    <rect x="260" y="575" width="120" height="40" fill="#ffdfe1" stroke="#c16f78"/>
    <text x="270" y="600">Reset</text>
    <rect x="390" y="575" width="170" height="40" fill="#fff0ea" stroke="#c16f78"/>
    <text x="400" y="600">Step count</text>
    <rect x="570" y="575" width="120" height="40" fill="#ffdfe1" stroke="#c16f78"/>
    <text x="580" y="600">Previous</text>
    <rect x="700" y="575" width="120" height="40" fill="#ffdfe1" stroke="#c16f78"/>
    <text x="710" y="600">Next</text>

    <!-- Controls row 2 -->
    <rect x="50" y="625" width="200" height="32" fill="#eaf4ff" stroke="#6b9fcc"/>
    <text x="60" y="648">Toggle: Show CO2 Trace</text>
    <rect x="260" y="625" width="200" height="32" fill="#eaf4ff" stroke="#6b9fcc"/>
    <text x="270" y="648">Label: Auto Step Delay</text>
    <rect x="470" y="625" width="250" height="32" fill="#fef6e8" stroke="#c16f78"/>
    <text x="480" y="648">Slider (1.0s - 4.0s)</text>
    <rect x="730" y="625" width="120" height="32" fill="#fff4e3" stroke="#c16f78"/>
    <text x="740" y="648">Value readout</text>
  </svg>

  <p>
    All rectangles have explicit heights and spacing; no overlap occurs from 450 px to 1200 px widths. Vertical spacing ensures each label remains legible within its region.
  </p>
</body>
</html>
