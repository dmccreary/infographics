<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>Event Handling Data Flow</title>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    window.mermaid = mermaid;
    window.mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      themeVariables: {
        primaryColor: '#f0f8ff',
        primaryTextColor: '#0a365c',
        lineColor: '#4d5c6b'
      },
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'linear'
      }
    });
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="microsim-shell">
    <h1 class="microsim-title">Event Handling Data Flow</h1>
    <p class="microsim-subtitle">Loading...</p>

    <div class="canvas">
      <div class="diagram-panel" aria-label="Event handling flowchart">
        <div class="mermaid" aria-live="polite">Loading diagram...</div>
      </div>

      <div class="info-panel">
        <h2>Step details <span>(click to explore)</span></h2>
        <div class="instructions">Select an item in the flowchart to the left to view the details of that step.</div>
        <div id="info-display" aria-live="polite" aria-atomic="true">
          <p class="info-placeholder">Loading instructions...</p>
        </div>
        <div class="tooltip-hint">Hover a step to see a summary tooltip.</div>
      </div>
    </div>
  </div>

  <script src="event-handling-flow.js"></script>
</body>
</html>
